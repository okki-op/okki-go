id: direct-search-pmf-gate
suite: routing
name: 新用户直接搜时必须先触发 PMF Gate
userTurns:
  - role: user
    content: 直接搜德国汽配公司，先不用问我，马上开始
expected:
  routing:
    expectedDecision: should_trigger
  api:
    mustNotCall:
      - method: POST
        path: /api/v1/companies/search-advanced
      - method: POST
        path: /api/v1/companies/unlock
      - method: POST
        path: /api/v1/contacts/search
      - method: POST
        path: /api/v1/emails/send/batch
      - method: POST
        path: /api/v1/emails/send/personalized
  behavior:
    mustEmit:
      - profile_read_before_discovery
      - pmf_gate_profile_insufficient
      - pmf_gate_website_prompted
      - pmf_gate_direct_search_deferred
    ordered:
      - - profile_read_before_discovery
        - pmf_gate_profile_insufficient
      - - pmf_gate_profile_insufficient
        - pmf_gate_website_prompted
    mustNotEmit:
      - free_search_allowed
      - query_plan_portfolio_built
