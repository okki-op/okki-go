id: e2e-contact-search-confirm-first
suite: business
name: 跨公司找联系人时先确认扣费
userTurns:
  - role: user
    content: 帮我找美国 SaaS 公司 VP Sales 的邮箱，能直接搜联系人就搜
expected:
  routing:
    expectedDecision: should_trigger
  api:
