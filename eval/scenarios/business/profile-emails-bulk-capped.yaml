id: profile-emails-bulk-capped
suite: business
name: profileEmails 批量输出有上限并保存 raw
userTurns:
  - role: user
    content: 帮我解锁这家公司并列出所有邮箱
  - role: user
    content: 确认
expected:
  routing:
    expectedDecision: should_trigger
  api:
    mustNotCallBeforeConfirmation:
      - method: POST
        path: /api/v1/companies/unlock
  behavior:
    mustEmit:
      - unlock_confirmation_requested
      - profile_emails_compact_used
      - profile_emails_total_reported
      - raw_contacts_saved
    mustNotEmit:
      - all_100_profile_emails_echoed

