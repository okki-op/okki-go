id: pmf-gate-skip-rough-search
suite: business
name: 明确跳过后只允许带欠画像标签的免费粗搜
userTurns:
  - role: user
    content: 直接搜德国汽配公司
  - role: user
    content: 跳过，先粗搜
expected:
  routing:
    expectedDecision: should_trigger
  api:
    mustCall:
      - method: POST
        path: /api/v1/companies/search-advanced
        body:
          include:
            includeCountry:
              - DE
            crossFieldOperator: AND
    mustNotCall:
      - method: POST
        path: /api/v1/companies/unlock
      - method: POST
        path: /api/v1/contacts/search
  behavior:
    mustEmit:
      - pmf_gate_profile_insufficient
      - pmf_gate_website_prompted
      - pmf_gate_direct_search_deferred
      - rough_search_after_explicit_skip
      - rough_search_labeled_under_profiled
      - skip_not_saved_as_preference
    ordered:
      - - pmf_gate_website_prompted
        - rough_search_after_explicit_skip
    mustNotEmit:
      - profile_confirmed_saved
