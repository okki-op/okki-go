id: viewed-lifecycle
suite: business
name: viewed/unlocked 生命周期映射到三段结果组
userTurns:
  - role: user
    content: 再搜一批德国汽配公司，之前看过和已解锁的请分开显示，展示后记录已看
expected:
  routing:
    expectedDecision: should_trigger
  api:
    mustCall:
      - method: POST
        path: /api/v1/companies/search-advanced
  behavior:
    mustEmit:
      - viewed_classify_before_display
      - group_unlocked_displayed
      - group_seen_displayed
      - group_new_displayed
      - mark_shown_after_display
      - mark_unlocked_after_successful_unlock
      - unlocked_window_30_days
    ordered:
      - - viewed_classify_before_display
        - group_unlocked_displayed
      - - viewed_classify_before_display
        - group_seen_displayed
      - - viewed_classify_before_display
        - group_new_displayed
      - - group_new_displayed
        - mark_shown_after_display
    mustNotEmit:
      - mark_unlocked_before_unlock_success
      - manual_viewed_json_write
