id: current-turn-merchant-seed-packaging
suite: business
name: 当前输入已包含商家画像时不得重复询问国家和产品
userTurns:
  - role: user
    content: 我是纸品包装制造商，有欧盟环保认证，帮我找意大利的潜客
expected:
  routing:
    expectedDecision: should_trigger
  api:
    mustCall:
      - method: POST
        path: /api/v1/companies/search-advanced
        body:
          include:
            includeCountry:
              - IT
            productKeywords:
              - sustainable packaging
              - paper packaging
          exclude:
            companyTypeKeywords:
              - brand
              - importer
              - distributor
              - manufacturer
            industryKeywords:
              - food and beverage
              - cosmetics
            crossFieldOperator: AND
  behavior:
    mustEmit:
      - current_turn_merchant_seed_extracted
      - current_turn_country_used
      - current_turn_product_used
      - current_turn_capability_used
      - trade_mode_unknown_degraded_not_blocked
      - pmf_brief_built
      - merchant_offer_anchor_recorded
      - target_side_projection_built
      - round1_recall_first_one_dimension
      - target_geo_preserved
    ordered:
      - - current_turn_merchant_seed_extracted
        - pmf_brief_built
      - - pmf_brief_built
        - round1_recall_first_one_dimension
    mustNotEmit:
      - pmf_gate_website_prompted
      - repeated_profile_country_question
      - repeated_primary_product_question
      - lite_onboarding_started
      - query_plan_portfolio_built
