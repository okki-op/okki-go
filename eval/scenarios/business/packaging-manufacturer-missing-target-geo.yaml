id: packaging-manufacturer-missing-target-geo
suite: business
name: 纸品包装制造商缺目标市场时只问目标市场不重复问产品
userTurns:
  - role: user
    content: 我是纸品包装制造商，帮我开发潜客
expected:
  routing:
    expectedDecision: should_trigger
  api:
    mustNotCall:
      - method: POST
        path: /api/v1/companies/search-advanced
      - method: POST
        path: /api/v1/companies/unlock
      - method: POST
        path: /api/v1/contacts/search
  behavior:
    mustEmit:
      - current_turn_merchant_seed_extracted
      - current_turn_product_used
      - target_geo_missing_question
      - lite_onboarding_deferred
    ordered:
      - - current_turn_merchant_seed_extracted
        - target_geo_missing_question
    mustNotEmit:
      - repeated_primary_product_question
      - repeated_company_type_question
      - repeated_profile_country_question
      - lite_onboarding_started
