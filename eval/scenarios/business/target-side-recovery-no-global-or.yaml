id: target-side-recovery-no-global-or
suite: business
name: 结果稀疏时必须做目标侧恢复而不是全局 OR 宽化
userTurns:
  - role: user
    content: 我们做定制门锁，德国渠道首轮结果太少，继续找
expected:
  routing:
    expectedDecision: should_trigger
  api:
    mustCall:
      - method: POST
        path: /api/v1/companies/search-advanced
        body:
          include:
            includeCountry:
              - DE
            productKeywords:
              - architectural hardware
            companyTypeKeywords:
              - wholesaler
            crossFieldOperator: and
          exclude:
            crossFieldOperator: or
  behavior:
    mustEmit:
      - target_side_recovery_applied
      - target_side_recovery_route_retained
      - target_side_projection_built
      - global_or_broadening_blocked
    mustNotEmit:
      - global_or_broadening_applied
